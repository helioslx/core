name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        node:
          - 22
          - 24
          - 26
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        if: matrix.os != 'ubuntu-latest' || matrix.node != 22
        run: npm test

      - name: Test with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build
        run: npm run build

      - name: Typecheck examples against built package
        run: >-
          npx tsc --ignoreConfig --noEmit --strict --exactOptionalPropertyTypes
          --noUncheckedIndexedAccess --skipLibCheck --target ES2023
          --module NodeNext --moduleResolution NodeNext
          --types node
          examples/*.ts

      - name: Inspect package contents
        run: npm pack --dry-run

      - name: Install packed artifact as an external consumer
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        shell: bash
        run: |
          tarball="$(npm pack --silent)"
          fixture="$(mktemp -d)"
          npm init --yes --prefix "$fixture"
          npm install --prefix "$fixture" "$GITHUB_WORKSPACE/$tarball" sacn redis elysia @elysiajs/node @elysiajs/openapi
          (
            cd "$fixture"
            node --input-type=module -e "await Promise.all(['@helioslx/core', '@helioslx/core/node', '@helioslx/core/redis', '@helioslx/core/http', '@helioslx/core/testing'].map((specifier) => import(specifier)))"
          )

  bun:
    name: Bun compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js for package tooling
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --no-save

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Inspect package contents
        run: npm pack --dry-run

  redis:
    name: Redis integration
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      REDIS_URL: redis://127.0.0.1:6379
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Redis integration test
        run: npx vitest run test/redis.integration.test.ts
