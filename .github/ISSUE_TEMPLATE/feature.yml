name: Feature request
description: Propose a focused improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need is not met today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe observable behavior, not only an implementation.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: Scope and compatibility
      options:
        - label: This stays within raw sACN output/viewing rather than fixtures or scenes.
        - label: I described public API, persistence, runtime, and safety impact where relevant.
